<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DartForge Companion</title>
<style>
  :root {
    --bg: #282a36;
    --bg-dark: #1e1f29;
    --fg: #f8f8f2;
    --fg-dim: #6272a4;
    --cyan: #8be9fd;
    --green: #50fa7b;
    --red: #ff5555;
    --orange: #ffb86c;
    --purple: #bd93f9;
    --input-bg: #21222c;
    --border: #44475a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    overflow: hidden;
    -webkit-text-size-adjust: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── Header ────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #header .title {
    font-size: 14px;
    font-weight: bold;
    color: var(--cyan);
  }

  #status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--fg-dim);
  }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  #status-dot.connected { background: var(--green); }
  #status-dot.ws-only { background: var(--orange); }

  /* ── Output area ───────────────────────────────── */
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.4;
    -webkit-overflow-scrolling: touch;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Input area ────────────────────────────────── */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg-dark);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #cmd-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
  }

  #cmd-input:focus { border-color: var(--cyan); }

  #send-btn {
    background: var(--cyan);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
  }

  #send-btn:active { opacity: 0.8; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Connection control buttons ──────────────────── */
  #conn-controls {
    display: flex;
    gap: 6px;
  }

  .conn-btn {
    background: var(--border);
    color: var(--fg);
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
  }

  .conn-btn:active { opacity: 0.8; }
  .conn-btn.connect { background: var(--green); color: var(--bg); }
  .conn-btn.disconnect { background: var(--red); color: var(--bg); }

  /* ── ANSI color classes (generated by ansi_up or manual) ── */
  .ansi-bright-black { color: #6272a4; }
  .ansi-red { color: #ff5555; }
  .ansi-green { color: #50fa7b; }
  .ansi-yellow { color: #f1fa8c; }
  .ansi-blue { color: #6272a4; }
  .ansi-magenta { color: #ff79c6; }
  .ansi-cyan { color: #8be9fd; }
  .ansi-white { color: #f8f8f2; }
  .ansi-bright-red { color: #ff6e6e; }
  .ansi-bright-green { color: #69ff94; }
  .ansi-bright-yellow { color: #ffffa5; }
  .ansi-bright-blue { color: #d6acff; }
  .ansi-bright-magenta { color: #ff92df; }
  .ansi-bright-cyan { color: #a4ffff; }
  .ansi-bright-white { color: #ffffff; }
  .ansi-bold { font-weight: bold; }

  /* ── Reconnect banner ──────────────────────────── */
  #reconnect-banner {
    display: none;
    padding: 6px 12px;
    background: var(--red);
    color: var(--bg);
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
  }

  #reconnect-banner.visible { display: block; }

  /* Scrollback notice */
  #scroll-notice {
    display: none;
    position: fixed;
    bottom: 60px;
    right: 12px;
    background: var(--purple);
    color: var(--bg);
    font-size: 11px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 10;
  }
  #scroll-notice.visible { display: block; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <span class="title">DartForge</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="conn-controls">
        <button class="conn-btn connect" id="btn-connect" title="Connect DartForge to MUD">Connect</button>
        <button class="conn-btn disconnect" id="btn-disconnect" title="Disconnect DartForge from MUD">Disconnect</button>
      </div>
      <div id="status">
        <div id="status-dot"></div>
        <span id="status-text">Connecting...</span>
      </div>
    </div>
  </div>
  <div id="reconnect-banner">Connection lost. Tap to reconnect.</div>
  <div id="output"></div>
  <div id="scroll-notice">&#x25BC; New output</div>
  <div id="input-bar">
    <input id="cmd-input" type="text" placeholder="Type a command..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── ANSI parser (lightweight, no dependencies) ──────────────
  const ANSI_COLORS = {
    30: 'ansi-black', 31: 'ansi-red', 32: 'ansi-green', 33: 'ansi-yellow',
    34: 'ansi-blue', 35: 'ansi-magenta', 36: 'ansi-cyan', 37: 'ansi-white',
    90: 'ansi-bright-black', 91: 'ansi-bright-red', 92: 'ansi-bright-green',
    93: 'ansi-bright-yellow', 94: 'ansi-bright-blue', 95: 'ansi-bright-magenta',
    96: 'ansi-bright-cyan', 97: 'ansi-bright-white'
  };

  function ansiToHtml(text) {
    let result = '';
    let openSpans = 0;
    const parts = text.split(/(\x1b\[[0-9;]*m)/);

    for (const part of parts) {
      const match = part.match(/^\x1b\[([0-9;]*)m$/);
      if (match) {
        const codes = match[1].split(';').map(Number);
        for (const code of codes) {
          if (code === 0) {
            // Reset
            while (openSpans > 0) { result += '</span>'; openSpans--; }
          } else if (code === 1) {
            result += '<span class="ansi-bold">'; openSpans++;
          } else if (ANSI_COLORS[code]) {
            result += '<span class="' + ANSI_COLORS[code] + '">'; openSpans++;
          }
        }
      } else {
        // Escape HTML entities
        result += part.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
    }

    while (openSpans > 0) { result += '</span>'; openSpans--; }
    return result;
  }

  // ── Elements ────────────────────────────────────────────────
  const output = document.getElementById('output');
  const cmdInput = document.getElementById('cmd-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const reconnectBanner = document.getElementById('reconnect-banner');
  const scrollNotice = document.getElementById('scroll-notice');

  // ── State ───────────────────────────────────────────────────
  let ws = null;
  let mudConnected = false;
  let autoScroll = true;
  const MAX_OUTPUT_LINES = 2000;
  const commandHistory = [];
  let historyIndex = -1;

  // ── Auto-scroll detection ───────────────────────────────────
  output.addEventListener('scroll', function() {
    const atBottom = output.scrollHeight - output.scrollTop - output.clientHeight < 40;
    autoScroll = atBottom;
    if (atBottom) scrollNotice.classList.remove('visible');
  });

  scrollNotice.addEventListener('click', function() {
    output.scrollTop = output.scrollHeight;
    autoScroll = true;
    scrollNotice.classList.remove('visible');
  });

  // ── Output management ───────────────────────────────────────
  function appendOutput(html) {
    output.insertAdjacentHTML('beforeend', html);

    // Trim if too many lines (count child nodes roughly)
    while (output.childNodes.length > MAX_OUTPUT_LINES) {
      output.removeChild(output.firstChild);
    }

    if (autoScroll) {
      output.scrollTop = output.scrollHeight;
    } else {
      scrollNotice.classList.add('visible');
    }
  }

  // ── WebSocket ───────────────────────────────────────────────
  let reconnectTimer = null;
  let reconnectDelay = 1000;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = proto + '//' + location.host + '/ws';

    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      statusDot.className = mudConnected ? 'connected' : 'ws-only';
      statusText.textContent = mudConnected ? 'Connected' : 'WS connected';
      reconnectBanner.classList.remove('visible');
      sendBtn.disabled = false;
      reconnectDelay = 1000;
    };

    ws.onmessage = function(e) {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'output') {
          appendOutput(ansiToHtml(msg.data));
        } else if (msg.type === 'status') {
          mudConnected = msg.connected;
          if (ws && ws.readyState === WebSocket.OPEN) {
            statusDot.className = mudConnected ? 'connected' : 'ws-only';
            statusText.textContent = msg.message;
          }
          updateConnButtons();
        }
      } catch (err) {
        console.error('Parse error:', err);
      }
    };

    ws.onclose = function() {
      statusDot.className = '';
      statusText.textContent = 'Disconnected';
      sendBtn.disabled = true;
      reconnectBanner.classList.add('visible');

      reconnectTimer = setTimeout(function() {
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
        connect();
      }, reconnectDelay);
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  reconnectBanner.addEventListener('click', function() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectDelay = 1000;
    connect();
  });

  // ── Send command ────────────────────────────────────────────
  function sendCommand() {
    const cmd = cmdInput.value;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(cmd);
      if (cmd.trim()) {
        commandHistory.unshift(cmd);
        if (commandHistory.length > 100) commandHistory.pop();
      }
      historyIndex = -1;
      cmdInput.value = '';
    }
  }

  sendBtn.addEventListener('click', sendCommand);

  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendCommand();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        cmdInput.value = commandHistory[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        cmdInput.value = commandHistory[historyIndex];
      } else {
        historyIndex = -1;
        cmdInput.value = '';
      }
    }
  });

  // ── Connection control buttons ─────────────────────────────
  var btnConnect = document.getElementById('btn-connect');
  var btnDisconnect = document.getElementById('btn-disconnect');

  function updateConnButtons() {
    btnConnect.style.display = mudConnected ? 'none' : '';
    btnDisconnect.style.display = mudConnected ? '' : 'none';
  }
  updateConnButtons();

  btnConnect.addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reconnect' }));
    }
  });

  btnDisconnect.addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'disconnect' }));
    }
  });

  // ── Start ───────────────────────────────────────────────────
  connect();
  cmdInput.focus();
})();
</script>
</body>
</html>
