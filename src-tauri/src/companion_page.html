<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e1f29">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DartForge</title>
<style>
  :root {
    --bg: #282a36;
    --bg-dark: #1e1f29;
    --bg-input: #21222c;
    --fg: #f8f8f2;
    --fg-dim: #6272a4;
    --cyan: #8be9fd;
    --green: #50fa7b;
    --red: #ff5555;
    --orange: #ffb86c;
    --purple: #bd93f9;
    --border: #44475a;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    overflow: hidden;
    -webkit-text-size-adjust: none;
    touch-action: manipulation;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── Header ──────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-icon {
    width: 18px;
    height: 18px;
    color: var(--cyan);
  }

  .brand-name {
    font-size: 15px;
    font-weight: bold;
    color: var(--cyan);
  }

  #header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Status ──────────────────────────────────────── */
  #status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--fg-dim);
  }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  #status-dot.connected { background: var(--green); }
  #status-dot.ws-only { background: var(--orange); }

  /* ── Connection buttons ──────────────────────────── */
  .conn-btn {
    background: var(--border);
    color: var(--fg);
    border: none;
    border-radius: 4px;
    padding: 5px 10px;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .conn-btn:active { opacity: 0.8; }
  .conn-btn.connect { background: var(--green); color: var(--bg-dark); }
  .conn-btn.disconnect { background: var(--red); color: var(--bg-dark); }

  /* ── Reconnect banner ────────────────────────────── */
  #reconnect-banner {
    display: none;
    padding: 8px 14px;
    background: var(--red);
    color: var(--bg-dark);
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #reconnect-banner.visible { display: block; }

  /* ── Output ──────────────────────────────────────── */
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.45;
    -webkit-overflow-scrolling: touch;
  }

  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── ANSI colors ─────────────────────────────────── */
  .ansi-black { color: #44475a; }
  .ansi-bright-black { color: #6272a4; }
  .ansi-red { color: #ff5555; }
  .ansi-green { color: #50fa7b; }
  .ansi-yellow { color: #f1fa8c; }
  .ansi-blue { color: #6272a4; }
  .ansi-magenta { color: #ff79c6; }
  .ansi-cyan { color: #8be9fd; }
  .ansi-white { color: #f8f8f2; }
  .ansi-bright-red { color: #ff6e6e; }
  .ansi-bright-green { color: #69ff94; }
  .ansi-bright-yellow { color: #ffffa5; }
  .ansi-bright-blue { color: #d6acff; }
  .ansi-bright-magenta { color: #ff92df; }
  .ansi-bright-cyan { color: #a4ffff; }
  .ansi-bright-white { color: #ffffff; }
  .ansi-bold { font-weight: bold; }

  /* ── Scroll notice ───────────────────────────────── */
  #scroll-notice {
    display: none;
    position: fixed;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--purple);
    color: var(--bg-dark);
    font-size: 11px;
    font-weight: bold;
    padding: 5px 14px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }
  #scroll-notice.visible { display: block; }

  /* ── D-pad ───────────────────────────────────────── */
  #qbar-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 22px;
    background: var(--bg-dark);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--fg-dim);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  #qbar-toggle:active { color: var(--cyan); }

  #quick-bar {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px;
    background: var(--bg-dark);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #quick-bar.collapsed { display: none; }

  .qrow {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .quick-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 40px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--cyan);
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    padding: 0 8px;
    -webkit-tap-highlight-color: transparent;
  }

  .quick-btn:active {
    background: var(--border);
  }

  .quick-btn.spacer {
    background: transparent;
    border-color: transparent;
    pointer-events: none;
  }

  .qsep {
    width: 8px;
    flex-shrink: 0;
  }

  /* ── Input ───────────────────────────────────────── */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 8px 10px 10px;
    background: var(--bg-dark);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #cmd-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
    font-family: inherit;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    -webkit-appearance: none;
  }

  #cmd-input:focus { border-color: var(--cyan); }
  #cmd-input::placeholder { color: var(--fg-dim); }

  #send-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    background: var(--cyan);
    color: var(--bg-dark);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  #send-btn svg { width: 20px; height: 20px; }
  #send-btn:active { opacity: 0.8; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Empty state ─────────────────────────────────── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 40px 20px;
    color: var(--fg-dim);
    text-align: center;
    font-size: 12px;
  }
  #empty-state.hidden { display: none; }

  /* ── Landscape ───────────────────────────────────── */
  @media (max-height: 500px) {
    .quick-btn { height: 34px; min-width: 38px; font-size: 12px; }
    #quick-bar { padding: 5px 10px; gap: 3px; }
    #input-bar { padding: 6px 10px; }
    #cmd-input { padding: 10px 12px; font-size: 15px; }
    #header { padding: 6px 12px; }
    #scroll-notice { bottom: 100px; }
  }

  @media (min-width: 420px) {
    .quick-btn { min-width: 50px; height: 42px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span class="brand-name">DartForge</span>
    </div>
    <div id="header-right">
      <button class="conn-btn connect" id="btn-connect">Connect</button>
      <button class="conn-btn disconnect" id="btn-disconnect" style="display:none">Disconnect</button>
      <div id="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">Connecting</span>
      </div>
    </div>
  </div>

  <div id="reconnect-banner">Connection lost — tap to reconnect</div>

  <div id="output">
    <div id="empty-state">
      Waiting for MUD output...
    </div>
  </div>

  <div id="scroll-notice">&#x25BC; New output</div>

  <button id="qbar-toggle" title="Toggle directional pad">&#x25B2; D-Pad</button>
  <div id="quick-bar">
    <div class="qrow">
      <button class="quick-btn" data-cmd="nw">NW</button>
      <button class="quick-btn" data-cmd="n">N</button>
      <button class="quick-btn" data-cmd="ne">NE</button>
      <div class="qsep"></div>
      <button class="quick-btn" data-cmd="u">Up</button>
    </div>
    <div class="qrow">
      <button class="quick-btn" data-cmd="w">W</button>
      <button class="quick-btn spacer"></button>
      <button class="quick-btn" data-cmd="e">E</button>
      <div class="qsep"></div>
      <button class="quick-btn" data-cmd="d">Dn</button>
    </div>
    <div class="qrow">
      <button class="quick-btn" data-cmd="sw">SW</button>
      <button class="quick-btn" data-cmd="s">S</button>
      <button class="quick-btn" data-cmd="se">SE</button>
    </div>
  </div>

  <div id="input-bar">
    <input id="cmd-input" type="text" placeholder="Enter command..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="send">
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── ANSI parser ───────────────────────────────────────────────
  var ANSI_COLORS = {
    30: 'ansi-black', 31: 'ansi-red', 32: 'ansi-green', 33: 'ansi-yellow',
    34: 'ansi-blue', 35: 'ansi-magenta', 36: 'ansi-cyan', 37: 'ansi-white',
    90: 'ansi-bright-black', 91: 'ansi-bright-red', 92: 'ansi-bright-green',
    93: 'ansi-bright-yellow', 94: 'ansi-bright-blue', 95: 'ansi-bright-magenta',
    96: 'ansi-bright-cyan', 97: 'ansi-bright-white'
  };

  function ansiToHtml(text) {
    var result = '';
    var openSpans = 0;
    var parts = text.split(/(\x1b\[[0-9;]*m)/);

    for (var i = 0; i < parts.length; i++) {
      var part = parts[i];
      var match = part.match(/^\x1b\[([0-9;]*)m$/);
      if (match) {
        var codes = match[1].split(';').map(Number);
        for (var j = 0; j < codes.length; j++) {
          var code = codes[j];
          if (code === 0) {
            while (openSpans > 0) { result += '</span>'; openSpans--; }
          } else if (code === 1) {
            result += '<span class="ansi-bold">'; openSpans++;
          } else if (ANSI_COLORS[code]) {
            result += '<span class="' + ANSI_COLORS[code] + '">'; openSpans++;
          }
        }
      } else {
        result += part.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
    }

    while (openSpans > 0) { result += '</span>'; openSpans--; }
    return result;
  }

  // ── Elements ──────────────────────────────────────────────────
  var output = document.getElementById('output');
  var cmdInput = document.getElementById('cmd-input');
  var sendBtn = document.getElementById('send-btn');
  var statusDot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var reconnectBanner = document.getElementById('reconnect-banner');
  var scrollNotice = document.getElementById('scroll-notice');
  var emptyState = document.getElementById('empty-state');
  var btnConnect = document.getElementById('btn-connect');
  var btnDisconnect = document.getElementById('btn-disconnect');
  var qbarToggle = document.getElementById('qbar-toggle');
  var quickBar = document.getElementById('quick-bar');

  // ── State ─────────────────────────────────────────────────────
  var ws = null;
  var mudConnected = false;
  var autoScroll = true;
  var hasOutput = false;
  var MAX_OUTPUT_LINES = 2000;
  var commandHistory = [];
  var historyIndex = -1;

  // ── Quick-bar toggle (persisted) ──────────────────────────────
  var qbarVisible = true;
  try { qbarVisible = localStorage.getItem('df-qbar') !== '0'; } catch(e) {}
  if (!qbarVisible) quickBar.classList.add('collapsed');

  qbarToggle.addEventListener('click', function() {
    qbarVisible = !qbarVisible;
    quickBar.classList.toggle('collapsed', !qbarVisible);
    qbarToggle.innerHTML = qbarVisible ? '&#x25B2; D-Pad' : '&#x25BC; D-Pad';
    try { localStorage.setItem('df-qbar', qbarVisible ? '1' : '0'); } catch(e) {}
  });

  // ── Auto-scroll detection ────────────────────────────────────
  output.addEventListener('scroll', function() {
    var atBottom = output.scrollHeight - output.scrollTop - output.clientHeight < 40;
    autoScroll = atBottom;
    if (atBottom) scrollNotice.classList.remove('visible');
  });

  scrollNotice.addEventListener('click', function() {
    output.scrollTop = output.scrollHeight;
    autoScroll = true;
    scrollNotice.classList.remove('visible');
  });

  // ── Output management ────────────────────────────────────────
  function appendOutput(html) {
    if (!hasOutput) {
      hasOutput = true;
      emptyState.classList.add('hidden');
    }

    output.insertAdjacentHTML('beforeend', html);

    while (output.childNodes.length > MAX_OUTPUT_LINES) {
      output.removeChild(output.firstChild);
    }

    if (autoScroll) {
      output.scrollTop = output.scrollHeight;
    } else {
      scrollNotice.classList.add('visible');
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────
  var reconnectTimer = null;
  var reconnectDelay = 1000;

  function connect() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsUrl = proto + '//' + location.host + '/ws';

    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      statusDot.className = mudConnected ? 'connected' : 'ws-only';
      statusText.textContent = mudConnected ? 'Connected' : 'WS Only';
      reconnectBanner.classList.remove('visible');
      sendBtn.disabled = false;
      reconnectDelay = 1000;
    };

    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.type === 'output') {
          appendOutput(ansiToHtml(msg.data));
        } else if (msg.type === 'status') {
          mudConnected = msg.connected;
          if (ws && ws.readyState === WebSocket.OPEN) {
            statusDot.className = mudConnected ? 'connected' : 'ws-only';
            statusText.textContent = msg.message;
          }
          updateConnButtons();
        }
      } catch (err) {
        console.error('Parse error:', err);
      }
    };

    ws.onclose = function() {
      statusDot.className = '';
      statusText.textContent = 'Disconnected';
      sendBtn.disabled = true;
      reconnectBanner.classList.add('visible');

      reconnectTimer = setTimeout(function() {
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
        connect();
      }, reconnectDelay);
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  reconnectBanner.addEventListener('click', function() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectDelay = 1000;
    connect();
  });

  // ── Send command ──────────────────────────────────────────────
  function sendCommand(cmd) {
    if (cmd === undefined) cmd = cmdInput.value;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(cmd);
      if (cmd.trim()) {
        if (commandHistory.length === 0 || commandHistory[0] !== cmd) {
          commandHistory.unshift(cmd);
          if (commandHistory.length > 100) commandHistory.pop();
        }
      }
      historyIndex = -1;
      if (cmd === cmdInput.value) cmdInput.value = '';
    }
  }

  sendBtn.addEventListener('click', function() { sendCommand(); });

  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendCommand();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        cmdInput.value = commandHistory[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        cmdInput.value = commandHistory[historyIndex];
      } else {
        historyIndex = -1;
        cmdInput.value = '';
      }
    }
  });

  // ── Quick command buttons ─────────────────────────────────────
  quickBar.addEventListener('click', function(e) {
    var btn = e.target.closest('.quick-btn');
    if (!btn || btn.classList.contains('spacer')) return;
    var cmd = btn.getAttribute('data-cmd');
    if (cmd) sendCommand(cmd);
  });

  // ── Connection control buttons ────────────────────────────────
  function updateConnButtons() {
    btnConnect.style.display = mudConnected ? 'none' : '';
    btnDisconnect.style.display = mudConnected ? '' : 'none';
  }
  updateConnButtons();

  btnConnect.addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reconnect' }));
    }
  });

  btnDisconnect.addEventListener('click', function() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'disconnect' }));
    }
  });

  // ── Start ─────────────────────────────────────────────────────
  connect();
  cmdInput.focus();
})();
</script>
</body>
</html>
